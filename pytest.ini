[pytest]
# Pytest configuration for stream_fit package

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    survey: marks tests related to survey functionality
    injection: marks tests for injection utilities
    observed: marks tests for injection utilities
    model: marks tests for model functionality
    utils: marks tests for utility functions

# Minimum Python version
minversion = 3.8
