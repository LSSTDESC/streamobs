# Configuration file for the Roman HLWAS Medium tier
#
# The selection function (completeness and photometric-error tables) is
# characterised from the Roman-Rubin DC2 synthetic survey (Troxel et al.
# 2023, arXiv:2209.06829) and shared with the roman_dc2 release.  The
# magnitude-limit map is an exposure-time-scaled quasi-depth map built for
# the HLWAS medium-tier footprint in the same truth-anchored S/N=5 convention
# as the DC2 F158 map (see docs page "Roman HLWAS Survey Files").
#
# Depth recipe: depth(pix) = 26.4 + 1.25*log10(t(pix)/t_median)
#   t_median = 645.1 s (median over medium-tier footprint)
#   reported depth reference: STScI HLWAS page, F158 medium tier, 5-sigma
#     https://roman-docs.stsci.edu/roman-community-defined-surveys/high-latitude-wide-area-survey
#   measured map median: 26.41 AB
#   DC2 F158 map median (reference convention): 26.38 AB
#
# Generated by: scripts/roman/build_hlwas_maglim_maps.py
name: roman
release: hlwas_medium
survey_files:
    # Path to data files (leave empty for default: data/surveys/roman_hlwas_medium)
    file_path: ''

    # Band-specific magnitude-limit map: exposure-time-scaled quasi-depth,
    # truth-anchored S/N=5 convention (same as roman_dc2).
    maglim_map_f158: roman_hlwas_medium_maglim_f158_nside1024.fits.gz

    # Band-independent maps
    ebv_map: ebv_sfd98_lowres_nside_512_ring_equatorial.fits

    # Selection-function tables (DC2-derived, symlinked from data/surveys/roman_dc2/
    # by scripts/roman/build_hlwas_maglim_maps.py; reused for all HLWAS tiers)
    completeness: roman_stellar_efficiency_cutf158.csv
    completeness_band: f158   # completeness derived in the F158 band

    # Two-curve photometric error model:
    #   catalog = median reported SExtractor magerr (drives the S/N cut)
    #   sample  = truth-based scatter of (obs - true)  (drives the noise draw)
    log_photo_error_catalog: roman_photoerror_f158_catalog.csv
    log_photo_error_sample: roman_photoerror_f158.csv

survey_properties:
    # F158 only: F106/F129 maps are not yet constructed for HLWAS; F184 is
    # excluded (deep-tier-only in the community-defined HLWAS and has a known
    # chromatic calibration issue in the DC2 mock, Troxel+23 Sec 5.3).
    bands: ['f158']

    # Extinction coefficients per band (A_band / E(B-V))
    # Official STScI values from Roman-STScI-000825 (Sharma), Table 3:
    # bandpass-integrated with synphot for a solar-parameter Phoenix spectrum.
    coeff_extinc_f106: 1.1495
    coeff_extinc_f129: 0.8497
    coeff_extinc_f158: 0.6140

    # Systematic photometric errors (mag)
    sys_error: 0.005

    # Saturation: simulation clips at ~1.1e5 e-; saturation effects appear
    # brighter than mag ~17 (Troxel+23 Fig 7).
    saturation: 17.0
    # delta_saturation = saturation - map_median = 17.0 - 26.41 = -9.41
    delta_saturation: -9.41
