# Configuration file for the Roman HLWAS All tier (all tiers stacked)
#
# The selection function (completeness and photometric-error tables) is
# characterised from the Roman-Rubin DC2 synthetic survey (Troxel et al.
# 2023, arXiv:2209.06829) and shared with the roman_dc2 release.  The
# magnitude-limit maps are exposure-time-scaled quasi-depth maps built for
# the stacked HLWAS footprint (wide + medium + deep + ultra-deep) in the
# same truth-anchored S/N=5 convention as the DC2 maps (see docs page
# "Roman HLWAS Survey Files").
#
# The 'all' maps (map_HLWAS-all_F158.hsp, map_HLWAS-all_F106.hsp) merge the
# exposures from all HLWAS tiers.  Deep and ultra-deep pixels (<0.5% of the
# footprint) receive t >> 645 s and thus a deeper maglim; the map median
# stays near the wide/medium depth because wide+medium pixels dominate.
#
# Depth recipe (Option B — DC2 truth-anchored, exposure-ratio scaling):
#   depth(pix) = DC2_REF_DEPTH_band + 1.25 * log10( t(pix) / DC2_REF_EXPTIME )
#   DC2_REF_DEPTH_band = median of the DC2 maglim map for that band (read at runtime)
#                        F158: 26.375 AB, F106: 26.279 AB
#   DC2_REF_EXPTIME    = 770.0 s  (DC2 HLIS reference per-pixel exposure =
#                                   5.5 dithers × 140 s/exposure,
#                                   Troxel et al. 2023 arXiv:2209.06829 Sec. 3.1)
#   t(pix)             = per-pixel exposure time in seconds (from .hsp map, used directly)
#   measured map medians: F158 = 26.2894 AB, F106 = 26.1935 AB
#
# Note: completeness and photo-error tables are F158-derived; they are applied
# to all bands band-independently via delta_mag (obs - maglim_map(pix)).
#
# Generated by: scripts/roman/build_hlwas_maglim_maps.py
name: roman
release: hlwas_all
survey_files:
    # Path to data files (leave empty for default: data/surveys/roman_hlwas_all)
    file_path: ''

    # Band-specific magnitude-limit maps: exposure-time-scaled quasi-depth,
    # truth-anchored S/N=5 convention (same as roman_dc2).
    maglim_map_F106: roman_hlwas_all_maglim_f106_nside1024.fits.gz
    maglim_map_F158: roman_hlwas_all_maglim_f158_nside1024.fits.gz

    # Band-independent maps
    ebv_map: ebv_sfd98_lowres_nside_512_ring_equatorial.fits

    # Selection-function tables (DC2-derived, symlinked from data/surveys/roman_dc2/
    # by scripts/roman/build_hlwas_maglim_maps.py; reused for all HLWAS tiers)
    completeness: roman_stellar_efficiency_cutf158.csv
    completeness_band: F158   # completeness derived in the F158 band

    # Two-curve photometric error model:
    #   catalog = median reported SExtractor magerr (drives the S/N cut)
    #   sample  = truth-based scatter of (obs - true)  (drives the noise draw)
    log_photo_error_catalog: roman_photoerror_f158_catalog.csv
    log_photo_error_sample: roman_photoerror_f158.csv

survey_properties:
    # F106 and F158: F106 exposure-time map is available for the 'all' tier only;
    # F129 has no HLWAS exposure-time map; F184 is excluded (deep-tier-only in
    # the community-defined HLWAS and has a known chromatic calibration issue
    # in the DC2 mock, Troxel+23 Sec 5.3).
    bands: ['F106', 'F158']

    # Extinction coefficients per band (A_band / E(B-V))
    # Official STScI values from Roman-STScI-000825 (Sharma), Table 3:
    # bandpass-integrated with synphot for a solar-parameter Phoenix spectrum.
    coeff_extinc_F106: 1.1495
    coeff_extinc_F129: 0.8497
    coeff_extinc_F158: 0.6140

    # Systematic photometric errors (mag)
    sys_error: 0.005

    # Saturation: simulation clips at ~1.1e5 e-; saturation effects appear
    # brighter than mag ~17 (Troxel+23 Fig 7).
    saturation: 17.0
    # delta_saturation = saturation - map_median = 17.0 - 26.2894 = -9.2894
    delta_saturation: -9.2894
